<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omport - One Market for Import and Export</title>
    <style>
      @keyframes wave {
        0%,
        100% {
          transform: scaleY(0.8) translateX(-16px);
        }
        50% {
          transform: scaleY(1.2) translateX(0px);
        }
      }

      @keyframes shipRide {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-2px);
        }
      }

      @keyframes streetLineReverse {
        0% {
          left: 100%;
        }
        100% {
          left: -20px;
        }
      }

      @keyframes truckBounce {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-1px);
        }
      }

      @keyframes clockTick {
        0%,
        100% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(5deg);
        }
      }

      @keyframes clockRotate {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes globeSpin {
        0%,
        100% {
          transform: rotateY(0deg);
        }
        50% {
          transform: rotateY(180deg);
        }
      }

      @keyframes footerWave {
        0%,
        100% {
          transform: scaleY(0.6) translateX(-6.4px);
        }
        50% {
          transform: scaleY(1) translateX(0px);
        }
      }

      @keyframes footerShipRide {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-1px);
        }
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-3px);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes ping {
        75%,
        100% {
          transform: scale(2);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
